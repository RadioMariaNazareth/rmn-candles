<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RMN-Candles</title>

<link rel="icon" type="image/png" href="rmnlogo.png">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-auth-compat.js"></script>

<style>
@keyframes pulse-glow {
0%,100%{opacity:0.3;transform:scale(1) translateX(-50%)}
50%{opacity:0.6;transform:scale(1.15) translateX(-50%)}
}
@keyframes zoomOut {
  0%   { transform: translate(var(--tx), var(--ty)) scale(var(--from-scale)); }
  100% { transform: translate(var(--tx), var(--ty)) scale(var(--to-scale)); }
}
.animate-pulse-glow{animation:pulse-glow 3s ease-in-out infinite}
body{margin:0;overflow:hidden;background:#003e8b;touch-action:none; font-family: sans-serif;}
.transition-viewport{transition:transform .3s ease-out}
.bg-dots{
background-image:radial-gradient(rgba(255,255,255,.15) 1px,transparent 1px);
background-size:40px 40px;
}
.custom-scrollbar::-webkit-scrollbar{width:6px}
.custom-scrollbar::-webkit-scrollbar-track{background: #f1f1f1}
.custom-scrollbar::-webkit-scrollbar-thumb{background:#003e8b;border-radius:10px}
.glass-morphism {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.2);
}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const {useState,useEffect,useMemo,useRef,useCallback}=React;

const firebaseConfig={
apiKey:"AIzaSyBYo-4UQu26-w4irzS8y3ven_eLutoZFUQ",
authDomain:"rmn-candles.firebaseapp.com",
projectId:"rmn-candles",
storageBucket:"rmn-candles.firebasestorage.app",
messagingSenderId:"424166278065",
appId:"1:424166278065:web:8714ea739a848d09797390"
};

if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();
const appId='radio-maria-nazareth';

const Icon=({name,size=20})=>{
useEffect(()=>{if(window.lucide)window.lucide.createIcons()},[name]);
return <i data-lucide={name} style={{width:size,height:size}}></i>;
};

const TeaLightCandle=({name,pos})=>(
<div className="absolute flex flex-col items-center"
style={{left:pos.x,top:pos.y,transform:'translate(-50%,-50%)'}}>
<div className="relative">
<div className="absolute top-[-22px] left-1/2 -translate-x-1/2 w-12 h-12 bg-orange-400/40 rounded-full blur-xl animate-pulse-glow"></div>
<div className="absolute top-[-18px] left-1/2 -translate-x-1/2 w-2 h-4 bg-gradient-to-t from-orange-600 via-yellow-300 to-white rounded-full animate-bounce"></div>
<div className="w-10 h-5 bg-white rounded shadow text-[7px] flex items-center justify-center font-bold text-gray-800">
{name.substring(0,6)}
</div>
</div>
<span className="text-[10px] mt-1 text-white font-medium drop-shadow-md whitespace-nowrap">{name}</span>
</div>
);

function App(){
const [user,setUser]=useState(null);
const [view,setView]=useState('home');
const [people,setPeople]=useState([]);
const [formData,setFormData]=useState({name:'',amount:''});
const [isAdminModalOpen,setIsAdminModalOpen]=useState(false);
const [adminPass,setAdminPass]=useState('');
const [error, setError] = useState('');

const [scale,setScale]=useState(1);
const [position,setPosition]=useState({x:0,y:0});
const [isDragging,setIsDragging]=useState(false);
const [isAnimating,setIsAnimating]=useState(false);
const dragStart=useRef({x:0,y:0});
const holdTimer=useRef(null);
const initialPinchDist = useRef(null);
const animFrameRef = useRef(null);

// Animated zoom-out: from fromScale to toScale over ~400ms
const animateZoom = useCallback((targetX, targetY, fromScale, toScale) => {
  setIsAnimating(true);
  const duration = 400;
  const start = performance.now();

  const tick = (now) => {
    const elapsed = now - start;
    const t = Math.min(elapsed / duration, 1);
    // ease-out cubic
    const eased = 1 - Math.pow(1 - t, 3);
    const currentScale = fromScale + (toScale - fromScale) * eased;
    setScale(currentScale);
    if (t < 1) {
      animFrameRef.current = requestAnimationFrame(tick);
    } else {
      setIsAnimating(false);
    }
  };
  animFrameRef.current = requestAnimationFrame(tick);
}, []);

const centerCanvas = useCallback(() => {
  const offsetX = (window.innerWidth / 2) - 500;
  const offsetY = (window.innerHeight / 2) - 500;
  setPosition({x: offsetX, y: offsetY});
  // Zoom out from current scale to 1, with brief dip below 1 for effect
  setScale(prev => {
    const from = prev;
    // animate: first get current scale, animate to 0.75 then back to 1
    animateZoom(offsetX, offsetY, from, 0.75);
    setTimeout(() => animateZoom(offsetX, offsetY, 0.75, 1), 420);
    return prev;
  });
}, [animateZoom]);

const getPos=e=>{
if(e.touches)return{x:e.touches[0].clientX,y:e.touches[0].clientY};
return{x:e.clientX,y:e.clientY};
};

const getDistance = (touches) => {
    return Math.hypot(touches[0].pageX - touches[1].pageX, touches[0].pageY - touches[1].pageY);
};

const startHold=()=>{holdTimer.current=setTimeout(()=>setIsAdminModalOpen(true),5000);}
const cancelHold=()=>clearTimeout(holdTimer.current);

useEffect(()=>{
auth.onAuthStateChanged(async u=>{
if(!u)await auth.signInAnonymously();
else setUser(u);
});
// Center canvas and do intro zoom-out animation
const offsetX = (window.innerWidth / 2) - 500;
const offsetY = (window.innerHeight / 2) - 500;
setPosition({x: offsetX, y: offsetY});
// Start from 1.3, zoom out to 1
setScale(1.3);
setTimeout(() => animateZoom(offsetX, offsetY, 1.3, 1), 200);
},[]);

useEffect(()=>{
if(!user)return;
return db.collection('candles').doc(appId).collection('people')
.orderBy('timestamp','asc')
.onSnapshot(snap=>setPeople(snap.docs.map(d=>({id:d.id,...d.data()}))));
},[user]);

const peopleWithPositions=useMemo(()=>{
return people.map((p,i)=>{
const r=180 + Math.sqrt(i) * 65;
const a=i * 2.4;
return{...p,posX:`${500+r*Math.cos(a)}px`,posY:`${500+r*Math.sin(a)}px`};
});
},[people]);

const handleAdd=async e=>{
e.preventDefault();
if(!formData.name || !formData.amount) return;
await db.collection('candles').doc(appId).collection('people').add({
name:formData.name,
amount:parseFloat(formData.amount)||0,
timestamp:firebase.firestore.FieldValue.serverTimestamp()
});
setFormData({name:'',amount:''});
};

const handleLogin = () => {
    if(adminPass === 'admin123'){
        setView('admin');
        setIsAdminModalOpen(false);
        setError('');
    } else {
        setError('كلمة المرور غير صحيحة');
    }
};

useEffect(() => {
    const handleWheel = (e) => {
        if (view !== 'home') return;
        e.preventDefault();
        const delta = e.deltaY * -0.001;
        setScale(prev => Math.min(Math.max(0.3, prev + delta), 3));
    };
    window.addEventListener('wheel', handleWheel, { passive: false });
    return () => window.removeEventListener('wheel', handleWheel);
}, [view]);

return(
<div className="fixed inset-0 text-white select-none overflow-hidden"
onMouseMove={e=>{ if(!isDragging)return; const p=getPos(e); setPosition({x:p.x-dragStart.current.x,y:p.y-dragStart.current.y}); }}
onMouseUp={()=>setIsDragging(false)}
onTouchMove={e=>{ 
    if (e.touches.length === 2) {
        const dist = getDistance(e.touches);
        if (initialPinchDist.current) {
            const diff = dist / initialPinchDist.current;
            setScale(prev => Math.min(Math.max(0.3, prev * diff), 3));
        }
        initialPinchDist.current = dist;
    } else if (isDragging) {
        const p=getPos(e); 
        setPosition({x:p.x-dragStart.current.x,y:p.y-dragStart.current.y}); 
    }
}}
onTouchEnd={()=>{setIsDragging(false); initialPinchDist.current = null;}}
>

{/* Top-right: recenter button only */}
<div className="fixed top-4 right-4 md:top-6 md:right-6 flex flex-col gap-3 z-50 items-end">
  <button onClick={centerCanvas}
    className="w-12 h-12 bg-yellow-400 text-blue-900 rounded-full flex items-center justify-center shadow-lg hover:bg-yellow-300 transition-colors">
    <Icon name="maximize"/>
  </button>

  {view === 'admin' && (
    <button onClick={()=>setView('home')} className="w-12 h-12 bg-white text-blue-900 rounded-full flex items-center justify-center shadow-lg">
      <Icon name="home"/>
    </button>
  )}
</div>

{/* Center-bottom: Arabic text + light candle button */}
{view === 'home' && (
  <div className="fixed bottom-8 left-1/2 -translate-x-1/2 z-50 flex flex-col items-center gap-2">
    <p className="text-white text-lg font-semibold drop-shadow-lg text-center"
       style={{fontFamily:'serif', textShadow:'0 2px 8px rgba(0,0,0,0.5)'}}>
      لكِ يا مريمُ أُضيءُ شمعةَ حُبي
    </p>
    <a href="https://www.radiomariam.org.il/donate" target="_blank"
      className="px-8 py-3 bg-yellow-400 text-blue-900 rounded-full font-bold text-center shadow-lg hover:bg-yellow-300 transition-all active:scale-95 text-base md:text-lg"
      onMouseDown={startHold} onMouseUp={cancelHold} onTouchStart={startHold} onTouchEnd={cancelHold}>
      قم بإضاءة شمعة
    </a>
  </div>
)}

{view==='home'?(
<main className="h-full cursor-grab active:cursor-grabbing"
onMouseDown={e=>{ const p=getPos(e); setIsDragging(true); dragStart.current={x:p.x-position.x,y:p.y-position.y}; }}
onTouchStart={e=>{ 
    if (e.touches.length === 1) {
        const p=getPos(e); setIsDragging(true); dragStart.current={x:p.x-position.x,y:p.y-position.y}; 
    } else if (e.touches.length === 2) {
        initialPinchDist.current = getDistance(e.touches);
    }
}}
>
<div className="absolute inset-0 transition-viewport"
style={{transform:`translate(${position.x}px,${position.y}px) scale(${scale})`}}>
<div className="absolute inset-[-5000px] bg-dots"></div>
<div className="relative w-[1000px] h-[1000px]">
<div className="absolute w-64 h-64 bg-white/10 rounded-full flex items-center justify-center left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 backdrop-blur-sm border border-white/20">
<img src="rmnlogo.png" className="w-48 h-48 object-contain pointer-events-none"/>
</div>
{peopleWithPositions.map(p=>(
<TeaLightCandle key={p.id} name={p.name} pos={{x:p.posX,y:p.posY}}/>
))}
</div>
</div>
</main>
):(
/* ADMIN VIEW UI */
<main className="flex h-full bg-slate-50 text-slate-800">
    <div className="w-full md:w-1/3 p-8 bg-white shadow-xl z-10">
        <div className="mb-8 text-right">
            <h2 className="text-2xl font-bold text-blue-900">لوحة التحكم</h2>
            <p className="text-slate-500">إضافة متبرع جديد للقائمة</p>
        </div>
        <form onSubmit={handleAdd} className="space-y-5" dir="rtl">
            <div>
                <label className="block text-sm font-semibold mb-2 text-slate-600">اسم المتبرع</label>
                <input required placeholder="أدخل الاسم..."
                value={formData.name}
                onChange={e=>setFormData({...formData,name:e.target.value})}
                className="w-full p-4 bg-slate-100 rounded-xl border-none focus:ring-2 focus:ring-blue-500 outline-none transition-all"/>
            </div>
            <div>
                <label className="block text-sm font-semibold mb-2 text-slate-600">القيمة</label>
                <input required type="number" placeholder="0.00"
                value={formData.amount}
                onChange={e=>setFormData({...formData,amount:e.target.value})}
                className="w-full p-4 bg-slate-100 rounded-xl border-none focus:ring-2 focus:ring-blue-500 outline-none transition-all"/>
            </div>
            <button className="w-full bg-blue-900 hover:bg-blue-800 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2">
                <Icon name="plus-circle" size={20}/>
                إضافة للقائمة
            </button>
        </form>
    </div>

    <div className="hidden md:flex flex-1 flex-col p-8 overflow-hidden" dir="rtl">
        <div className="flex justify-between items-center mb-6">
            <h3 className="text-xl font-bold">آخر الشموع المضاءة</h3>
            <span className="bg-blue-100 text-blue-800 px-4 py-1 rounded-full text-sm font-bold">
                الإجمالي: {people.length}
            </span>
        </div>
        <div className="flex-1 overflow-y-auto custom-scrollbar pl-2 space-y-3">
            {people.slice().reverse().map(p=>(
                <div key={p.id} className="p-4 bg-white rounded-xl shadow-sm border border-slate-100 flex justify-between items-center hover:border-blue-200 transition-colors">
                    <div className="flex items-center gap-3">
                        <div className="w-10 h-10 bg-orange-100 rounded-full flex items-center justify-center text-orange-600">
                            <Icon name="flame" size={18}/>
                        </div>
                        <span className="font-semibold text-slate-700">{p.name}</span>
                    </div>
                    <span className="font-mono font-bold text-green-600">+{p.amount}₪</span>
                </div>
            ))}
        </div>
    </div>
</main>
)}

{/* ADMIN LOGIN MODAL UI */}
{isAdminModalOpen&&(
<div className="fixed inset-0 bg-blue-900/40 backdrop-blur-md flex items-center justify-center z-[100] p-4">
    <div className="glass-morphism p-8 rounded-3xl shadow-2xl w-full max-w-sm border border-white/50 relative overflow-hidden">
        <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-yellow-400 to-orange-500"></div>
        <div className="text-center mb-6">
            <div className="w-16 h-16 bg-blue-900 text-white rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
                <Icon name="lock" size={32}/>
            </div>
            <h2 className="text-2xl font-bold text-slate-800">دخول المشرف</h2>
            <p className="text-slate-500 text-sm mt-1">يرجى إدخال كلمة المرور للمتابعة</p>
        </div>
        <div className="space-y-4">
            <input type="password" 
                autoFocus
                placeholder="كلمة المرور"
                value={adminPass}
                onChange={e=>{setAdminPass(e.target.value); setError('')}}
                onKeyDown={e => e.key === 'Enter' && handleLogin()}
                className="w-full p-4 bg-slate-100 rounded-xl border-2 border-transparent focus:border-blue-500 focus:bg-white outline-none transition-all text-center text-slate-800 text-lg tracking-widest"
            />
            {error && <p className="text-red-500 text-center text-xs font-bold">{error}</p>}
            <div className="flex gap-2">
                <button onClick={()=>setIsAdminModalOpen(false)} className="flex-1 py-3 text-slate-500 font-semibold hover:bg-slate-50 rounded-xl transition-colors">إلغاء</button>
                <button onClick={handleLogin} className="flex-[2] bg-blue-900 hover:bg-blue-800 text-white font-bold py-3 rounded-xl shadow-lg transition-all active:scale-95">دخول</button>
            </div>
        </div>
    </div>
</div>
)}

</div>
);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
